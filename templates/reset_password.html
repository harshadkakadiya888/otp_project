<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            width: 400px;
            margin: 60px auto;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .msg {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .email-box {
            background: #eee;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2>🔐 Reset Password</h2>

        <form method="post">
            {% csrf_token %}

            {% if email %}
                <div class="email-box">
                    Email: <b>{{ email }}</b>
                </div>
                <input type="hidden" name="email" value="{{ email }}">
            {% else %}
                <input type="email" name="email" placeholder="Enter your email" required>
            {% endif %}

            <button type="submit" name="action" value="send_otp">Send OTP</button>

            <input type="text" name="otp" placeholder="Enter OTP">

            <input type="password" name="password" placeholder="New Password">

            <button type="submit" name="action" value="reset">Reset Password</button>

            {% if msg %}
                <p class="msg success">{{ msg }}</p>
            {% endif %}

            {% if error %}
                <p class="msg error">{{ error }}</p>
            {% endif %}
        </form>

    </div>
</div>

</body>
</html>
