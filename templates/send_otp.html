<style>
.container {
    width: 350px;
    margin: 50px auto;
    padding: 25px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* 👇 બધા fields માટે spacing */
.container input,
.container select {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px; /* 👈 gap */
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* 👇 button full width */
.container button {
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.container button:hover {
    background: #45a049;
}

.links {
    text-align: center;
    margin-top: 15px;
}

.container h2 {
    text-align: center;
}
</style>

<div class="container">
    <h2>Register</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <select name="role" required>
            <option value="">Select Role</option>
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <!-- 👇 button હવે નીચે -->
        <button type="submit">Register</button>

        <div class="links">
            Already registered? 
            <a href="{% url 'login' %}" style="color:#4CAF50;">Login</a>
        </div>
    </form>
</div>
